plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    // JMH for microbenchmarks (run with `gradle :app:jmh`).
    testImplementation 'org.openjdk.jmh:jmh-core:1.37'
    testAnnotationProcessor 'org.openjdk.jmh:jmh-generator-annprocess:1.37'


    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'com.ruskaof.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

// Simple JMH runner: generates and runs benchmarks on the test classpath.
tasks.register('jmh', JavaExec) {
    group = 'benchmark'
    description = 'Run JMH benchmarks for the app module'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'org.openjdk.jmh.Main'
    // Example includes; customize or override from CLI if needed.
    args = ['com.ruskaof.algorithm.ExtendibleHashTableBenchmark.*',
            'com.ruskaof.algorithm.PerfectHashBenchmark.*']
}
